name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

# engine-sim-bridge requires macOS (CoreAudio / AudioQueue).
# Linux/Windows builds are not supported — no audio implementation exists for those platforms.
jobs:
  build-and-test:
    name: Build and Test (macOS)
    runs-on: macos-latest

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        brew install bison flex boost ccache
        # bison is keg-only (macOS ships 2.3, Piranha needs 3.2+).
        echo "/opt/homebrew/opt/bison/bin" >> $GITHUB_PATH
        echo "/usr/local/opt/bison/bin"    >> $GITHUB_PATH

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-macos-${{ github.sha }}
        restore-keys: |
          ccache-macos-

    - name: Restore FetchContent dependencies
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: fetchcontent-macos-${{ hashFiles('CMakeLists.txt', 'engine-sim/CMakeLists.txt') }}
        restore-keys: |
          fetchcontent-macos-

    - name: Configure
      run: |
        cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build -- -j$(sysctl -n hw.logicalcpu)

    - name: Run tests
      # Exclude *_NOT_BUILT entries: engine-sim registers its own test binary but
      # the bridge includes engine-sim with EXCLUDE_FROM_ALL so that binary is not built.
      run: ctest --test-dir build --output-on-failure -E "_NOT_BUILT"
