# SonarCloud analysis for engine-sim-bridge
# C++ analysis requires macOS (CoreAudio dependency) and CMake compile_commands.json.
name: SonarCloud analysis

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  pull-requests: read
  contents: read

jobs:
  Analysis:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew bundle --file Brewfile
          # bison is keg-only (macOS ships 2.3, Piranha needs 3.2+).
          echo "/opt/homebrew/opt/bison/bin" >> $GITHUB_PATH
          echo "/usr/local/opt/bison/bin"    >> $GITHUB_PATH

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args:
            -Dsonar.projectKey=danieljsinclair_engine-sim-bridge
            -Dsonar.organization=danieljsinclair
          projectBaseDir: .
