sonar.projectKey=danieljsinclair_engine-sim-bridge
sonar.projectName=engine-sim-bridge
sonar.sources=src
sonar.sourceEncoding=UTF-8
sonar.cfamily.compile-commands=build/compile_commands.json
sonar.host.url=https://sonarcloud.io
sonar.organization=danieljsinclair
sonar.exclusions=engine-sim/**,build/**,preset/**,es/**,tmp/**,.github/**
sonar.coverage.exclusions=test/**,engine-sim/**,tools/**
sonar.cfamily.threads=4
sonar.sourceVersion=17
# Coverage: use the generic coverage XML (sonar-generic-coverage.xsd), the same
# format the app uses (via xccov_to_sonar.py). The C++ cfamily llvm-cov sensor
# (sonar.cfamily.llvm-cov.reportPath) was NOT processing coverage.txt (0.0% on
# the dashboard); the generic XML path is reliably imported for all languages.
# Generated from build/lcov.info by scripts/lcov_to_xml.py during coverage-run.
sonar.coverageReportPaths=build-cov/coverage-sonar.xml
