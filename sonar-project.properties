sonar.projectKey=danieljsinclair_engine-sim-bridge
sonar.projectName=engine-sim-bridge
sonar.sources=src
sonar.sourceEncoding=UTF-8
# compile-commands and coverageReportPaths are passed dynamically from the Makefile
# via -D flags (using BUILD_COV_DIR as the single source of truth).
# Do NOT set them here — the Makefile overrides with $(BUILD_COV_DIR)/ paths.
#sonar.cfamily.compile-commands=build/compile_commands.json
sonar.host.url=https://sonarcloud.io
sonar.organization=danieljsinclair
sonar.exclusions=engine-sim/**,build/**,build-cov/**,preset/**,es/**,tmp/**,.github/**
sonar.coverage.exclusions=test/**,engine-sim/**,tools/**
sonar.cfamily.threads=4
sonar.sourceVersion=17
# Redirect all scanner working artifacts (including the cfamily taint-analysis
# reproducer tarball) into build-cov/.scannerwork so they land in an
# already-gitignored, scrubbable directory instead of the project root.
sonar.working.directory=build-cov/.scannerwork
# Coverage: use the generic coverage XML (sonar-generic-coverage.xsd), the same
# format the app uses (via xccov_to_sonar.py). The C++ cfamily llvm-cov sensor
# (sonar.cfamily.llvm-cov.reportPath) was NOT processing coverage.txt (0.0% on
# the dashboard); the generic XML path is reliably imported for all languages.
# Generated from build/lcov.info by scripts/lcov_to_xml.py during coverage-run.
# Coverage: passed dynamically from the Makefile as $(BUILD_COV_DIR)/coverage-sonar.xml.
# See sonar-project.properties note above — single source of truth = BUILD_COV_DIR.
#sonar.coverageReportPaths=build-cov/coverage-sonar.xml
